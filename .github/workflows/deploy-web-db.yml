name: Deploy Web DB

on: workflow_dispatch

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Clone Repository
        uses: actions/checkout@v6

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add to Known Hosts
        run: |
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy using DOCKER_HOST
        env:
          DOCKER_HOST: ssh://${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}
          MASTERPASS: ${{ secrets.MASTERPASS }}
          DRIZZLE_PORT: ${{ secrets.DRIZZLE_PORT }}
          DB_PATH: ${{ vars.DB_PATH }}
        run: |
          # Теперь все docker команды выполняются на удаленном сервере
          docker compose --profile web-db up -d --pull always --remove-orphans --force-recreate --wait --wait-timeout 30
          docker image prune -f
